workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "RudakiCargo.xcworkspace"
        XCODE_SCHEME: "RudakiCargo"
    scripts:
      - name: Install dependencies
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi
      - name: Build iOS app (unsigned)
        script: |
          xcodebuild build -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" -sdk iphoneos -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Create IPA
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/Release-iphoneos/*.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r RudakiCargo.ipa Payload/
    artifacts:
      - build/ios/ipa/RudakiCargo.ipa
